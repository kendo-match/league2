<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リーグ戦対戦表</title>
    <style>
        body { font-family: sans-serif; padding: 8px; margin: 0; background-color: #fff; color: #333; }
       
        .no-print { margin-bottom: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        h2 { margin-top: 0 !important; margin-bottom: 8px !important; font-size: 1.1em; }
       
        .form-group { margin-bottom: 8px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 2px; font-size: 0.9em; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .form-group textarea { height: 200px; }
       
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background-color: #007bff; color: white; font-weight: bold; font-size: 14px; }
        button:disabled { background-color: #ccc; }

        .page { margin-bottom: 30px; }
        .header-container { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        h1 { font-size: 1.2em; margin: 0; }
        .date-display { font-size: 0.8em; color: #666; }
       
        h2.section-title { font-size: 1em; margin: 30px 0 30px 0 !important; }
       
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #aaa; height: 30px; text-align: center; font-size: 11px; padding: 1px; position: relative; }
        th { background: #eee; }
       
.diagonal-line {
    background: #eee;
    background-image: linear-gradient(
        to top right,
        transparent 49%,
        #666 50%,
        #666 51%,
        transparent 52%
    );
}


        .match-num-col { width: 35px; }
        .match-num { position: absolute; top: 1px; left: 2px; font-size: 7px; color: #888; line-height: 1; }

.match-list-container {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 20px;
}
        .match-list-column { flex: 1; min-width: 100%; }

        .print-only { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 8mm; }
            .no-print { display: none; }
            .page { page-break-after: always; margin-bottom: 0; }
            .page:last-child { page-break-after: avoid; }
           
            /* 印刷時の対戦番号 */
            .match-num {
                color: #666 !important;
                font-size: 9px !important;
                top: 4px; 
                left: 4px;
            }

            .page table th {
                background-color: #eee !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

.page table {
    margin: 0 auto;
    border-collapse: separate !important;
    border-spacing: 0 !important;
    border-left: 1px solid #333;
    border-top: 1px solid #333;
}

.page table th,
.page table td {
    border: 0 !important;
    border-right: 1px solid #333 !important;
    border-bottom: 1px solid #333 !important;
    height: 45px !important;
}
            
.match-list-column table th,
.match-list-column table td {
    height: 45px !important;
}

            .page[data-n="3"] table { width: 50% !important; }
            .page[data-n="4"] table { width: 60% !important; }
            .page[data-n="5"] table { width: 70% !important; }
            .page[data-n="6"] table { width: 80% !important; }
            .page[data-n="7"] table { width: 90% !important; }
            .page[data-n="8"] table { width: 95% !important; }
            .page[data-n="9"] table { width: 100% !important; }
            .page[data-n="10"] table { width: 100% !important; }

            .print-only { display: table-cell !important; width: 25px !important; }
.diagonal-line {
    background: #eee !important;
    background-image: linear-gradient(
        to top right,
        transparent 49%,
        #666 50%,
        #666 51%,
        transparent 52%
    ) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
}
           
            .match-list-container { display: flex; flex-direction: row; flex-wrap: wrap; gap: 25px; }
            .print-col-1 { min-width: 50% !important; max-width: 50% !important; }
            .print-col-2 { min-width: 44% !important; }
            .print-col-3 { min-width: 29% !important; }
            .print-col-3 .match-num-col { width: 22px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2>リーグ戦作成ツール</h2>
    <div class="form-group"><label>試合名</label><input type="text" id="eventName" placeholder="例: 6月度月例試合"></div>
    <div class="form-group"><label>参加者名（3〜10人、改行区切り）</label><textarea id="names" placeholder="Aさん&#10;Bさん&#10;Cさん"></textarea></div>
    <button onclick="generate()">表を作成して表示</button>
    <button id="printBtn" onclick="window.print()" disabled style="background-color: #6c757d;">印刷する</button>
</div>

<div id="output"></div>

<script>
    const LEAGUE_TABLES = {
        3: [[0, 1, 3], [1, 0, 2], [3, 2, 0]], 4: [[0, 1, 5, 3], [1, 0, 4, 6], [5, 4, 0, 2], [3, 6, 2, 0]],
        5: [[0, 1, 6, 9, 3], [1, 0, 4, 7, 10], [6, 4, 0, 2, 8], [9, 7, 2, 0, 5], [3, 10, 8, 5, 0]],
        6: [[0, 1, 12, 8, 10, 6], [1, 0, 4, 13, 7, 11], [12, 4, 0, 2, 14, 9], [8, 13, 2, 0, 5, 15], [10, 7, 14, 5, 0, 3], [6, 11, 9, 15, 3, 0]],
        7: [[0, 1, 14, 8, 20, 12, 4], [1, 0, 5, 15, 9, 19, 13], [14, 5, 0, 2, 16, 10, 21], [8, 15, 2, 0, 6, 17, 11], [20, 9, 16, 6, 0, 3, 18], [12, 19, 10, 17, 3, 0, 7], [4, 13, 21, 11, 18, 7, 0]],
        8: [[0, 1, 17, 12, 23, 10, 27, 8], [1, 0, 5, 18, 13, 24, 9, 28], [17, 5, 0, 2, 19, 14, 25, 11], [12, 18, 2, 0, 6, 20, 15, 26], [23, 13, 19, 6, 0, 3, 21, 16], [10, 24, 14, 20, 3, 0, 7, 22], [27, 9, 25, 15, 21, 7, 0, 4], [8, 28, 11, 26, 16, 22, 4, 0]],
        9: [[0, 1, 24, 10, 19, 31, 16, 35, 5], [1, 0, 6, 25, 11, 20, 32, 17, 36], [24, 6, 0, 2, 26, 12, 21, 33, 18], [10, 25, 2, 0, 7, 27, 13, 22, 34], [19, 11, 26, 7, 0, 3, 28, 14, 23], [31, 20, 12, 27, 3, 0, 8, 29, 15], [16, 32, 21, 13, 28, 8, 0, 4, 30], [35, 17, 33, 22, 14, 29, 4, 0, 9], [5, 36, 18, 34, 23, 15, 30, 9, 0]],
        10: [[0, 1, 21, 14, 29, 35, 40, 12, 44, 10], [1, 0, 6, 22, 15, 30, 36, 41, 11, 45], [21, 6, 0, 2, 23, 16, 31, 37, 42, 13], [14, 22, 2, 0, 7, 24, 17, 32, 38, 43], [29, 15, 23, 7, 0, 3, 25, 18, 33, 39], [35, 30, 16, 24, 3, 0, 8, 26, 19, 34], [40, 36, 31, 17, 25, 8, 0, 4, 27, 20], [12, 41, 37, 32, 18, 26, 4, 0, 9, 28], [44, 11, 42, 38, 33, 19, 27, 9, 0, 5], [10, 45, 13, 43, 39, 34, 20, 28, 5, 0]]
    };

    function generate() {
        const names = document.getElementById('names').value.split('\n').map(n => n.trim()).filter(n => n !== "");
        const eventName = document.getElementById('eventName').value || "";
        const n = names.length;
        if (n < 3 || n > 10) { alert("3〜10人で入力してください"); return; }

        const now = new Date();
        const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;

        const matrix = LEAGUE_TABLES[n];
        let matches = [];
        for (let i = 0; i < n; i++) {
            for (let j = i + 1; j < n; j++) { matches.push({ p1: names[i], p2: names[j], originalNum: matrix[i][j] }); }
        }
        matches.sort((a, b) => a.originalNum - b.originalNum);
        matches.forEach((m, idx) => m.num = idx + 1);

        let printCols = 1;
        if (n >= 6 && n <= 8) printCols = 2;
        else if (n >= 9) printCols = 3;

        const headerHtml = `<div class="header-container"><h1>${eventName}</h1><div class="date-display">${dateStr}</div></div>`;
       
        let html = `<div class="page" data-n="${n}">` + headerHtml + `<h2 class="section-title">対戦表</h2><table><tr><th></th>`;
        names.forEach(name => html += `<th>${name}</th>`);
        html += `<th class="print-only">勝</th><th class="print-only">負</th><th class="print-only">分</th><th class="print-only">本数</th><th class="print-only">順位</th></tr>`;
       
        for (let i = 0; i < n; i++) {
            html += `<tr><th>${names[i]}</th>`;
            for (let j = 0; j < n; j++) {
                const match = matches.find(m => (m.p1 === names[i] && m.p2 === names[j]) || (m.p1 === names[j] && m.p2 === names[i]));
                html += (i === j) ? `<td class="diagonal-line"></td>` : `<td><span class="match-num">${match ? match.num : ""}</span></td>`;
            }
            html += `<td class="print-only"></td><td class="print-only"></td><td class="print-only"></td><td class="print-only"></td><td class="print-only"></td></tr>`;
        }
        html += `</table></div><div class='page'>` + headerHtml + `<h2 class="section-title">対戦順</h2><div class="match-list-container">`;
       
        const printColClass = `print-col-${printCols}`;
        const matchesPerCol = Math.ceil(matches.length / printCols);
       
        for (let c = 0; c < printCols; c++) {
            html += `<div class="match-list-column ${printColClass}"><table><tr><th class="match-num-col"></th><th>赤</th><th>白</th></tr>`;
            const colMatches = matches.slice(c * matchesPerCol, (c + 1) * matchesPerCol);
            colMatches.forEach(m => html += `<tr><td>${m.num}</td><td>${m.p1}</td><td>${m.p2}</td></tr>`);
            html += `</table></div>`;
        }
        html += `</div></div>`;

        document.getElementById('output').innerHTML = html;
        document.getElementById('printBtn').disabled = false;
        document.getElementById('printBtn').style.backgroundColor = '#28a745';
    }
</script>
</body>
</html>
